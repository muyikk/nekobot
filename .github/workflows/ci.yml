name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  code-check:
    name: Code Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install check tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff pytest

      - name: Ruff critical check
        run: |
          ruff check . --select E9,F63,F7,F82

      - name: Python syntax compile check
        run: |
          python -m compileall -q bot.py chat.py commands.py config.py heartbeat.py nbot tools

      - name: Install project dependencies if tests exist
        if: ${{ hashFiles('tests/**') != '' }}
        run: |
          python -m pip install -r requirements.txt

      - name: Run tests if tests directory exists
        shell: bash
        run: |
          if [ -d tests ]; then
            python -m pytest -q
          else
            echo "No tests directory, skip pytest."
          fi
